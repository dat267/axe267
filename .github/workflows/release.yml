name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  KEEP_RELEASES: ${{ vars.KEEP_RELEASES || '3' }}

jobs:
  backend:
    name: Backend (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goos:   [linux, darwin, windows]
        goarch: [amd64, arm64]
        include:
          - { goos: linux, goarch: arm }

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS:        ${{ matrix.goos }}
          GOARCH:      ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          SUFFIX=""
          [ "${{ matrix.goos }}" = "windows" ] && SUFFIX=".exe"
          OUT="axe-backend-${{ matrix.goos }}-${{ matrix.goarch }}${SUFFIX}"
          go build \
            -ldflags "-s -w -X main.version=axe-backend/${{ github.sha }}" \
            -o "$OUT" .

      - uses: actions/upload-artifact@v7
        with:
          name: backend-${{ matrix.goos }}-${{ matrix.goarch }}
          path: backend/axe-backend-${{ matrix.goos }}-${{ matrix.goarch }}*

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install and build
        working-directory: frontend
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Package
        run: |
          tar czf axe-frontend.tar.gz -C frontend/dist .

      - uses: actions/upload-artifact@v7
        with:
          name: frontend
          path: axe-frontend.tar.gz

  release-backend:
    needs: backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: backend-*
          merge-multiple: true

      - name: Compute tag
        id: meta
        run: |
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "tag=axe-backend/${SHA}" >> "$GITHUB_OUTPUT"
          echo "name=axe-backend ${SHA}" >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v3
        with:
          tag_name:               ${{ steps.meta.outputs.tag }}
          name:                   ${{ steps.meta.outputs.name }}
          target_commitish:       ${{ github.sha }}
          generate_release_notes: true
          files: "axe-backend-*"

      - name: Clean up old releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO:  ${{ github.repository }}
        run: |
          releases=$(gh release list --limit 100 --json tagName \
            | jq -r '.[].tagName' | grep "^axe-backend/")
          count=0
          for tag in $releases; do
            count=$((count + 1))
            [ "$count" -le "${{ env.KEEP_RELEASES }}" ] && continue
            echo "Deleting: $tag"
            gh release delete "$tag" --yes --cleanup-tag || true
          done

  release-frontend:
    needs: frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: frontend

      - name: Compute tag
        id: meta
        run: |
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "tag=axe-frontend/${SHA}" >> "$GITHUB_OUTPUT"
          echo "name=axe-frontend ${SHA}" >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v3
        with:
          tag_name:               ${{ steps.meta.outputs.tag }}
          name:                   ${{ steps.meta.outputs.name }}
          target_commitish:       ${{ github.sha }}
          generate_release_notes: true
          files: "axe-frontend.*"

      - name: Clean up old releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO:  ${{ github.repository }}
        run: |
          releases=$(gh release list --limit 100 --json tagName \
            | jq -r '.[].tagName' | grep "^axe-frontend/")
          count=0
          for tag in $releases; do
            count=$((count + 1))
            [ "$count" -le "${{ env.KEEP_RELEASES }}" ] && continue
            echo "Deleting: $tag"
            gh release delete "$tag" --yes --cleanup-tag || true
          done
