name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  TAG_PREFIX:    axe
  KEEP_RELEASES: ${{ vars.KEEP_RELEASES || '3' }}

jobs:
  backend:
    name: Backend (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goos:   [linux, darwin, windows]
        goarch: [amd64, arm64]
        include:
          - { goos: linux, goarch: arm }

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Build
        working-directory: backend
        env:
          GOOS:        ${{ matrix.goos }}
          GOARCH:      ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          SUFFIX=""
          [ "${{ matrix.goos }}" = "windows" ] && SUFFIX=".exe"
          OUT="axe-backend-${{ matrix.goos }}-${{ matrix.goarch }}${SUFFIX}"
          go build \
            -ldflags "-s -w -X main.version=${{ env.TAG_PREFIX }}/${{ github.sha }}" \
            -o "$OUT" .

      - uses: actions/upload-artifact@v7
        with:
          name: backend-${{ matrix.goos }}-${{ matrix.goarch }}
          path: backend/axe-backend-${{ matrix.goos }}-${{ matrix.goarch }}*

  frontend-dist:
    name: Frontend dist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install and build
        working-directory: frontend
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Package dist
        run: |
          tar czf axe-frontend-dist.tar.gz -C frontend/dist .

      - uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: axe-frontend-dist.tar.gz

  frontend-bin:
    name: Frontend (${{ matrix.target }})
    needs: frontend-dist
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [bun-linux-x64, bun-linux-arm64, bun-darwin-x64, bun-darwin-arm64, bun-windows-x64]
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Compile binary
        working-directory: frontend
        run: |
          SUFFIX=""
          [[ "${{ matrix.target }}" == bun-windows-* ]] && SUFFIX=".exe"
          OUT="axe-frontend-${{ matrix.target }}${SUFFIX}"
          bun build --compile --target=${{ matrix.target }} --minify --sourcemap ./serve.js --outfile "$OUT"

      - uses: actions/upload-artifact@v7
        with:
          name: frontend-${{ matrix.target }}
          path: frontend/axe-frontend-${{ matrix.target }}*

  release:
    needs: [backend, frontend-bin]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: "*"
          merge-multiple: true

      - name: Compute tag
        id: meta
        run: |
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "tag=${{ env.TAG_PREFIX }}/${SHA}" >> "$GITHUB_OUTPUT"
          echo "name=Release ${{ env.TAG_PREFIX }}/${SHA}" >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v3
        with:
          tag_name:               ${{ steps.meta.outputs.tag }}
          name:                   ${{ steps.meta.outputs.name }}
          target_commitish:       ${{ github.sha }}
          generate_release_notes: true
          files: "*"

      - name: Clean up old releases (keep ${{ env.KEEP_RELEASES }} most recent)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO:  ${{ github.repository }}
        run: |
          all=$(gh release list --limit 100 --json tagName \
            | jq -r '.[].tagName' | sort)

          # Keep releases matching current prefix, delete the rest
          count=0
          for tag in $all; do
            case "$tag" in
              ${{ env.TAG_PREFIX }}/*)
                count=$((count + 1))
                [ "$count" -le "${{ env.KEEP_RELEASES }}" ] && continue
                ;;
            esac
            echo "Deleting: $tag"
            gh release delete "$tag" --yes --cleanup-tag || true
          done
