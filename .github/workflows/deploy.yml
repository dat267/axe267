name: Deploy to Production
on:
  push:
    branches:
      - main
permissions:
  contents: read
  id-token: write
jobs:
  filter:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      frontend: ${{ steps.changes.outputs.frontend }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: changes
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/**'
            frontend:
              - 'frontend/**'
              - 'firestore.indexes.json'
              - 'firebase.json'
              - '.github/workflows/**'

  deploy-backend:
    needs: filter
    if: needs.filter.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Authenticate with GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: 'projects/72627348278/locations/global/workloadIdentityPools/github-actions/providers/github'
          service_account: 'firebase-adminsdk-fbsvc@axe267.iam.gserviceaccount.com'
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3
      - name: Deploy Go Backend to Cloud Run
        run: |
          gcloud run deploy axe-backend \
            --source backend \
            --region asia-southeast1 \
            --project ${{ secrets.VITE_FIREBASE_PROJECT_ID }} \
            --set-env-vars PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }} \
            --cpu 1 \
            --memory 128Mi \
            --max-instances 1 \
            --min-instances 0 \
            --concurrency 80 \
            --allow-unauthenticated \
            --quiet

  deploy-frontend:
    needs: filter
    if: needs.filter.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Authenticate with GCP
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: 'projects/72627348278/locations/global/workloadIdentityPools/github-actions/providers/github'
          service_account: 'firebase-adminsdk-fbsvc@axe267.iam.gserviceaccount.com'
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install and Build Frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
      - name: Deploy Frontend to Firebase Hosting
        run: |
          npx -y firebase-tools deploy --only firestore:indexes --project $PROJECT_ID --non-interactive
          npx -y firebase-tools deploy --only hosting --project $PROJECT_ID --non-interactive
        env:
          PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}
